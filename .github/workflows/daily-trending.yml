name: Daily GitHub Trending

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch trending data
        run: node scripts/fetch-trending.js
        env:
          DATA_DIR: ./data
      - name: Generate report
        run: node scripts/generate-report.js
        env:
          DATA_DIR: ./data
          REPORT_DIR: ./reports
      - name: Commit via API
        run: node scripts/commit-api.js
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
